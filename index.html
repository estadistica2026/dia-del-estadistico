<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día del Estadístico — 12 de Mayo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&family=Georgia&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            line-height: 1.8;
            overflow-x: hidden;
        }

        .progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            background: linear-gradient(90deg, #1a237e, #00bcd4);
            z-index: 1000;
            width: 0%;
        }

        .bg-deco {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-deco .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.10;
        }

        .bg-deco .orb:nth-child(1) {
            width: 600px; height: 600px;
            background: #1a237e;
            top: -200px; left: -200px;
        }
        .bg-deco .orb:nth-child(2) {
            width: 500px; height: 500px;
            background: #00bcd4;
            bottom: -150px; right: -150px;
        }
        .bg-deco .orb:nth-child(3) {
            width: 400px; height: 400px;
            background: #ff6f00;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.05;
        }

        .nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 100;
            padding: 0.9rem 1.5rem;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav a {
            color: #8b949e;
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500;
            transition: color 0.3s;
            padding: 0.2rem 0;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .nav a:hover {
            color: #00bcd4;
            border-bottom-color: #00bcd4;
        }

        .section {
            padding: 5rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        .section-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .section-label .line {
            width: 40px;
            height: 2px;
            background: #00bcd4;
            opacity: 0.5;
            flex-shrink: 0;
        }

        .section-label span {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #00bcd4;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.75rem);
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .section-text {
            color: #8b949e;
            font-size: 0.98rem;
            line-height: 1.9;
            margin-bottom: 1.25rem;
        }

        .section-text strong {
            color: #e6edf3;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8rem 2rem 4rem;
            position: relative;
            z-index: 1;
        }

        .hero-inner { max-width: 850px; }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0, 188, 212, 0.1);
            border: 1px solid rgba(0, 188, 212, 0.3);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-size: 0.78rem;
            color: #00bcd4;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .hero-badge .dot {
            width: 8px; height: 8px;
            background: #00bcd4;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.5rem;
        }

        .hero h1 span {
            background: linear-gradient(135deg, #1a237e, #00bcd4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-phrase {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: clamp(1rem, 2.5vw, 1.35rem);
            color: #ffa040;
            max-width: 700px;
            margin: 0 auto 1.25rem;
            line-height: 1.7;
            position: relative;
            padding: 0 2rem;
        }

        .hero-phrase::before {
            content: '"';
            position: absolute;
            left: -5px;
            top: -10px;
            font-size: 3rem;
            color: rgba(255, 160, 64, 0.3);
            font-family: 'Playfair Display', serif;
        }

        .hero-phrase::after {
            content: '"';
            font-size: 3rem;
            color: rgba(255, 160, 64, 0.3);
            font-family: 'Playfair Display', serif;
        }

        .hero p {
            font-size: 1.05rem;
            color: #8b949e;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .hero-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #1a237e, #00bcd4);
            margin: 2.5rem auto 0;
            border-radius: 2px;
        }

        .panama-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255, 111, 0, 0.1);
            border: 1px solid rgba(255, 111, 0, 0.3);
            padding: 0.6rem 1.5rem;
            border-radius: 12px;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #ffa040;
            font-weight: 600;
        }

        .panama-badge .flag {
            font-size: 1.3rem;
        }

        .card {
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid rgba(48, 54, 61, 0.5);
            border-radius: 18px;
            padding: 2rem;
            margin-top: 2rem;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, #1a237e, #00bcd4);
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .card p {
            color: #8b949e;
            line-height: 1.85;
            font-size: 0.95rem;
        }

        .card p strong { color: #e6edf3; }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .def-card {
            background: rgba(22, 27, 34, 0.5);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-radius: 16px;
            padding: 2rem;
        }

        .def-card:hover { border-color: rgba(0, 188, 212, 0.25); }

        .def-card .icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .def-card .icon.blue { background: rgba(57, 73, 171, 0.2); }
        .def-card .icon.cyan { background: rgba(0, 188, 212, 0.2); }

        .def-card h4 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }

        .def-card p {
            color: #8b949e;
            font-size: 0.88rem;
            line-height: 1.7;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stat-box {
            background: rgba(13, 17, 23, 0.5);
            border-radius: 12px;
            padding: 1.25rem 0.75rem;
            text-align: center;
            border: 1px solid rgba(48, 54, 61, 0.3);
        }

        .stat-box .val {
            font-size: 1.4rem;
            font-weight: 800;
            color: #00bcd4;
        }

        .stat-box .lbl {
            font-size: 0.72rem;
            color: #8b949e;
            margin-top: 0.25rem;
            line-height: 1.3;
        }

        .imp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .imp-card {
            background: rgba(22, 27, 34, 0.5);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-radius: 16px;
            padding: 2rem;
        }

        .imp-card:hover { border-color: rgba(0, 188, 212, 0.25); }

        .imp-card .emoji {
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        .imp-card h4 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }

        .imp-card p {
            color: #8b949e;
            font-size: 0.88rem;
            line-height: 1.7;
        }

        .imp-card ul {
            margin-top: 0.75rem;
            padding-left: 1.25rem;
            list-style: none;
        }

        .imp-card ul li {
            color: #8b949e;
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 0.4rem;
            position: relative;
            padding-left: 1rem;
        }

        .imp-card ul li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #00bcd4;
            font-weight: 700;
        }

        .inec-highlight {
            background: linear-gradient(135deg, rgba(26, 35, 126, 0.15), rgba(0, 188, 212, 0.08));
            border: 1px solid rgba(48, 54, 61, 0.5);
            border-radius: 18px;
            padding: 2.5rem;
            margin-top: 2rem;
            text-align: center;
        }

        .inec-highlight .inec-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6f00, #ffa040);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.25rem;
        }

        .inec-highlight .inec-full {
            color: #8b949e;
            font-size: 0.88rem;
            margin-bottom: 2rem;
        }

        .func-list {
            list-style: none;
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .func-list li {
            display: flex;
            gap: 1rem;
            padding: 1.25rem;
            background: rgba(22, 27, 34, 0.4);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-radius: 12px;
        }

        .func-list .num {
            width: 32px; height: 32px;
            min-width: 32px;
            background: rgba(0, 188, 212, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem;
            color: #00bcd4;
        }

        .func-list .info h5 {
            font-weight: 700;
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
        }

        .func-list .info p {
            color: #8b949e;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .process-steps {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-top: 2rem;
        }

        .process-step {
            display: flex;
            gap: 1.25rem;
            align-items: flex-start;
            padding: 1.5rem;
            background: rgba(22, 27, 34, 0.4);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-radius: 14px;
            position: relative;
        }

        .process-step:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 30px;
            bottom: -14px;
            width: 2px;
            height: 14px;
            background: #00bcd4;
            opacity: 0.4;
        }

        .process-step .step-num {
            width: 44px; height: 44px;
            min-width: 44px;
            background: linear-gradient(135deg, #1a237e, #00bcd4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
        }

        .process-step .step-info h5 {
            font-weight: 700;
            margin-bottom: 0.3rem;
            font-size: 1rem;
        }

        .process-step .step-info p {
            color: #8b949e;
            font-size: 0.88rem;
            line-height: 1.7;
        }

        .var-table-wrap {
            background: rgba(22, 27, 34, 0.5);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-radius: 16px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .var-table {
            width: 100%;
            border-collapse: collapse;
        }

        .var-table thead th {
            background: rgba(26, 35, 126, 0.25);
            padding: 1rem 1.25rem;
            text-align: left;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #3949ab;
        }

        .var-table tbody td {
            padding: 0.85rem 1.25rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
            color: #8b949e;
        }

        .var-table tbody td:first-child {
            font-weight: 600;
            color: #e6edf3;
        }

        .var-table tbody tr:hover {
            background: rgba(0, 188, 212, 0.03);
        }

        .apa-table-wrap {
            background: rgba(22, 27, 34, 0.5);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-radius: 16px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .apa-table-caption {
            padding: 1.5rem 2rem 0.75rem;
        }

        .apa-table-caption .t-num {
            font-weight: 700;
            font-style: italic;
            display: block;
            margin-bottom: 0.2rem;
            font-size: 0.95rem;
        }

        .apa-table-caption .t-desc {
            font-style: italic;
            color: #8b949e;
            font-size: 0.88rem;
        }

        .apa-table {
            width: 100%;
            border-collapse: collapse;
        }

        .apa-table thead th {
            background: rgba(26, 35, 126, 0.25);
            padding: 0.85rem 1rem;
            text-align: center;
            font-weight: 700;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #3949ab;
        }

        .apa-table tbody td {
            padding: 0.75rem 1rem;
            text-align: center;
            font-size: 0.88rem;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
            color: #8b949e;
        }

        .apa-table tbody td:first-child {
            text-align: left;
            font-weight: 600;
            color: #e6edf3;
        }

        .apa-table tfoot td {
            padding: 0.85rem 1rem;
            text-align: center;
            font-weight: 700;
            font-size: 0.88rem;
            border-top: 2px solid #3949ab;
            background: rgba(26, 35, 126, 0.1);
        }

        .apa-note {
            padding: 1rem 2rem 1.25rem;
            font-size: 0.78rem;
            color: #8b949e;
            font-style: italic;
            border-top: 1px solid rgba(48, 54, 61, 0.4);
            line-height: 1.6;
        }

        .chart-wrap {
            background: rgba(22, 27, 34, 0.5);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-radius: 16px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .chart-caption {
            padding: 1.5rem 2rem 0.75rem;
        }

        .chart-caption .f-num {
            font-weight: 700;
            font-style: italic;
            display: block;
            margin-bottom: 0.2rem;
            font-size: 0.95rem;
        }

        .chart-caption .f-desc {
            font-style: italic;
            color: #8b949e;
            font-size: 0.88rem;
        }

        .chart-area { padding: 1rem 2rem 1.5rem; }

        .bar-chart {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .bar-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .bar-label {
            width: 100px;
            min-width: 100px;
            font-size: 0.82rem;
            font-weight: 600;
            text-align: right;
        }

        .bar-track {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .bar-mini {
            height: 10px;
            border-radius: 5px;
        }

        .bar-mini.t1 { background: #3949ab; }
        .bar-mini.t2 { background: #00bcd4; }
        .bar-mini.t3 { background: #ff6f00; }
        .bar-mini.t4 { background: #00c853; }

        .bar-legend {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 0.75rem 2rem 1.25rem;
            border-top: 1px solid rgba(48, 54, 61, 0.4);
            flex-wrap: wrap;
        }

        .bar-legend span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
            color: #8b949e;
        }

        .bar-legend .swatch {
            width: 12px; height: 12px;
            border-radius: 3px;
        }

        .chart-note {
            padding: 0 2rem 1.25rem;
            font-size: 0.78rem;
            color: #8b949e;
            font-style: italic;
            line-height: 1.6;
        }

        .ref-box {
            background: rgba(22, 27, 34, 0.35);
            border: 1px solid rgba(48, 54, 61, 0.4);
            border-left: 4px solid #ff6f00;
            border-radius: 0 12px 12px 0;
